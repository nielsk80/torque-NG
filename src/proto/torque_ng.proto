syntax = "proto3";

package torque_ng;

import "google/protobuf/timestamp.proto";

// Protocol-level errors
enum TorqueProtobufError {
  TORQUE_OK = 0;
  TORQUE_UNKNOWN_ERROR = 1;
  TORQUE_MALFORMED_REQUEST = 2;
  TORQUE_ACCESS_DENIED = 3;
  TORQUE_VERSION_MISMATCH = 4;
}

// Internal PBSE results 
message TorqueStatus {
  bool success = 1;
  int32 pbse_code = 2;
  string message = 3;
}

// --- Data Models ---

message ResourceList {
  map<string, int64> int_resources = 1;
  map<string, uint64> size_resources = 2;
  map<string, string> string_resources = 3;
}

// Consolidated resource structure for JobEntity logic and tests
message ResourceUsage {
  uint64 mem_bytes = 1;
  uint64 vmem_bytes = 2;
  double walltime_used = 3;
  uint64 cpu_time_seconds = 4; // Required for obituary tests
}

message ResourceLimits {
  uint64 req_mem = 1;
  uint64 req_vmem = 2;
  uint32 req_nodes = 3;
  uint32 req_procs = 4;
  double req_walltime = 5;
}

message Job {
  string job_id = 1;
  string job_name = 2;
  string owner_name = 3;
  string effective_user_name = 4;
  string effective_group_name = 5;
  string email_addr = 6;

  enum JobState {
    TRANSIT = 0;
    QUEUED = 1;
    HELD = 2;
    WAITING = 3;
    RUNNING = 4;
    EXITING = 5;
    COMPLETE = 6;
  }

  enum JobSubState {
    SUB_NONE = 0;
    SUB_TRANSIT_REQUEUED = 10;
    SUB_STAGE_IN = 20;
    SUB_STAGE_OUT = 30;
    SUB_EXITING_CLEANUP = 40;
  }

  JobState state = 7;
  JobSubState sub_state = 18;
  int32 priority = 8;
  bool is_rerunnable = 9;
  bool is_interactive = 10;

  google.protobuf.Timestamp created_at = 11;

  string stage_in_files = 12;
  string stage_out_files = 13;

  ResourceList resources_requested = 14;
  ResourceList resources_used = 15;

  string server_id = 16;
  string queue_name = 17;
}

// Message wrapped by the JobEntity logic class
message JobStatusUpdate {
  string job_id = 1;
  string job_name = 14;
  string user_owner = 2;
  Job.JobState job_state = 3;
  Job.JobSubState job_substate = 4;
  bool is_interactive = 5;
  
  // These generate the mutable_*() helpers used in Job.cpp
  ResourceUsage resources_used = 6; 
  ResourceLimits limits = 7;
  
  string exec_host = 8;
  int32 exit_status = 9;
  uint64 queue_time = 10;
  uint64 modify_time = 11;

  // Maps for metadata
  map<string, string> attributes = 12;
  map<string, string> environment_vars = 13;
}

message JobStatusResponse {
  repeated JobStatusUpdate jobs = 1;
}

message Node {
  string name = 1;
  
  enum NodeState {
    FREE = 0;
    OFFLINE = 1;
    DOWN = 2;
    RESERVED = 3;
    JOB_EXCLUSIVE = 4;
    BUSY = 5;
    UNKNOWN = 6;
  }
  
  NodeState state = 2;
  int32 pcpus = 3;
  ResourceList resources = 4;
  string note = 5;
}

// --- Service Messages (Envelope Pattern) ---

message TorqueRequest {
  oneof payload {
    JobDeleteRequest delete = 1;
    JobSubmitRequest submit = 2;  
    JobObituary obituary = 3;
    JobStatusRequest status = 4;
    JobStatusUpdate update = 5; 
  }
}


message TorqueReply {
  int32 error_code = 1;
  string error_message = 2;
  
  oneof body {
    TorqueStatus generic_status = 4;
    JobStatusResponse status_data = 3;
  }
}

// --- Command Specific Messages ---

message JobDeleteRequest {
  string job_id = 1;
  string reason = 2;
  bool force = 3;
}

message JobStatusRequest {
  string job_id = 1;
}

message JobSubmitRequest {
  Job job = 1;
}

message JobObituary {
  string job_id = 1;
  int32 exit_status = 2;
  string node_name = 3;
  ResourceUsage resources = 4;
}

message GetNodeStatusRequest {
  string node_name = 1;
}

message GetNodeStatusResponse {
  TorqueProtobufError transport_error = 1;
  TorqueStatus result = 2;
  repeated Node nodes = 3;
}