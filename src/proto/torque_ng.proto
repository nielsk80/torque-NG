/*
 * torque-NG: Next Generation Resource Manager
 */

syntax = "proto3";
package torque_ng;

import "google/protobuf/timestamp.proto";

// --- Enums ---

enum TorqueProtobufError {
  TORQUE_OK = 0;
  TORQUE_UNKNOWN_ERROR = 1;
  TORQUE_MALFORMED_REQUEST = 2;
  TORQUE_ACCESS_DENIED = 3;
  TORQUE_VERSION_MISMATCH = 4;
}

// --- Basic Data Models ---

message TorqueStatus {
  bool success = 1;
  int32 pbse_code = 2;
  string message = 3;
}

message ResourceList {
  // Used resources
  uint64 mem_bytes = 1;
  uint64 vmem_bytes = 2;
  uint32 cpu_count = 3;
  double cpu_time_seconds = 4;
  double walltime_used = 5;

  // Requested limits
  uint64 req_mem = 6;
  uint64 req_vmem = 7;
  uint32 req_nodes = 8;
  uint32 req_procs = 9;
  double req_walltime = 10;

  // Extensible resources
  map<string, int64> int_resources = 11;
  map<string, uint64> size_resources = 12;
  map<string, string> string_resources = 13;
}

// --- Node & Queue Definitions ---

message Node {
  string name = 1;
  enum NodeState {
    FREE = 0; 
    OFFLINE = 1; 
    DOWN = 2; 
    RESERVED = 3;
    JOB_EXCLUSIVE = 4; 
    BUSY = 5; 
    UNKNOWN = 6;
  }
  NodeState state = 2;
  int32 pcpus = 3;
}

message Queue {
  string name = 1;
  enum QueueType { EXECUTION = 0; ROUTING = 1; }
  enum QueueState { STARTED = 0; STOPPED = 1; }

  QueueType type = 2;
  QueueState state = 3;
  bool enabled = 4;
  bool started = 5;  
  int32 priority = 6;
  uint32 max_running = 7; 
  uint32 max_queued = 8;
  ResourceList default_resources = 9;
  ResourceList max_resources = 10;
}

// --- Entity & Batch Messages ---

message Job {
  string job_id = 1;
  string job_name = 2;
  enum JobState {
    TRANSIT = 0; 
    QUEUED = 1; 
    HELD = 2; 
    WAITING = 3;
    RUNNING = 4; 
    EXITING = 5; 
    COMPLETE = 6;
  }
  enum JobSubState {
    SUB_NONE = 0; 
    SUB_TRANSIT = 1; 
    SUB_EXCEED_MEM = 2; 
    SUB_STAGE_IN = 3;
  }
  JobState state = 7;
  JobSubState substate = 8; 
  int32 priority = 9;
  google.protobuf.Timestamp created_at = 10;
  ResourceList resources_requested = 14;
  string queue_name = 17;
  string job_owner = 18; // Standardized naming
}

message NodeStatusBatch {
  repeated string names = 1;
  repeated Node.NodeState states = 2 [packed = true];
  repeated uint64 available_mem = 3 [packed = true];
  repeated int32 pcpus = 4 [packed = true];
  repeated ResourceList resources = 5;
  repeated string notes = 6;
  uint32 checksum = 7;
  uint64 last_update_ts = 8;
}

message JobIndexBatch {
  repeated string job_ids = 1;
  repeated Job.JobState states = 2 [packed = true];
  repeated int32 priorities = 3 [packed = true];
  repeated uint32 req_nodes = 4 [packed = true];
  repeated uint64 req_mem = 5 [packed = true];
  repeated string job_owner = 6; // Standardized naming
  repeated string queue_names = 8;
  uint32 total_jobs = 7;
}

message QueueStatusBatch {
  repeated string names = 1;
  repeated Queue.QueueType types = 2 [packed = true];
  repeated Queue.QueueState states = 3 [packed = true];
  repeated bool is_enabled = 4 [packed = true];
  repeated int32 priorities = 5 [packed = true];
  repeated uint32 count_running = 6 [packed = true];
  repeated uint32 count_queued = 7 [packed = true];
}

// --- Service & Update Messages ---

message JobObituary {
  string job_id = 1;
  int32 exit_status = 2;
  string node_name = 3;
  ResourceList resources = 4;
}

message JobStatusRequest {
  string job_id = 1;
}

message JobStatusUpdate {
  string job_id = 1;
  string job_name = 15;
  string job_owner = 2; // Standardized naming
  
  torque_ng.Job.JobState job_state = 3;
  torque_ng.Job.JobSubState job_substate = 4;
  
  bool is_interactive = 5;
  string exec_host = 6;
  int32 exit_status = 7;
  uint64 queue_time = 8;
  uint64 modify_time = 9;
  
  ResourceList resources_used = 10;
  ResourceList limits = 11;
  
  map<string, string> attributes = 12;
  map<string, string> environment_vars = 13;

  repeated JobStatusUpdate jobs = 14; 
}

message JobDeleteRequest { 
  string job_id = 1; 
  string reason = 2; 
  bool force = 3;
}

message JobSubmitRequest { Job job = 1; }
message GetNodeStatusRequest { string node_name = 1; }
message GetQueueStatusRequest { string queue_name = 1; }

// --- Service Envelopes ---

message TorqueRequest {
  oneof payload {
    JobDeleteRequest delete = 1;
    JobSubmitRequest submit = 2;
    GetNodeStatusRequest node_status = 3;
    GetQueueStatusRequest queue_status = 4;
    JobObituary obituary = 5;
    JobStatusRequest status = 6;
  }
}

message TorqueReply {
  int32 error_code = 1;
  string error_message = 2;
  oneof body {
    TorqueStatus generic_status = 3;
    NodeStatusBatch node_batch = 4;
    JobIndexBatch job_batch = 5;
    QueueStatusBatch queue_batch = 6;
    JobStatusUpdate status_data = 7;
  }
}